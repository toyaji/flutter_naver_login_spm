name: PR Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_and_test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x" # You can adjust this to your minimum supported version
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Format
        run: dart format --set-exit-if-changed lib/ test/ example/

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android_build:
    name: Android Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android Example
        working-directory: example/android
        run: ./gradlew assembleDebug

  ios_spm_build:
    name: iOS SPM Build Check
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Strip CocoaPods and Build SPM
        working-directory: example
        run: |
          cd ios
          pod deintegrate
          rm -rf Podfile.lock Pods/
          cd ..
          flutter build ios --no-codesign
